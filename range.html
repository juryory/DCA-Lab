<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DCALab 区间排行榜</title>
  <style>
    :root{--bg:#f6f1e7;--panel:#fffdf8;--line:#dfd3c0;--text:#30271b;--muted:#6f6554;--good:#1f6b3c;--bad:#973939;--gold:#9a6818}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 "Segoe UI","Microsoft YaHei",sans-serif}
    .wrap{max-width:1300px;margin:0 auto;padding:20px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    select,button{padding:8px 10px;border:1px solid var(--line);border-radius:10px;background:#fff}
    button{cursor:pointer}
    .meta{font-size:12px;color:var(--muted)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px 6px;border-bottom:1px solid #eee4d3;text-align:left}
    th{color:var(--muted)}
    tbody tr{cursor:pointer}
    tbody tr.selected{background:#f8f0df}
    .grid{display:grid;grid-template-columns:1.2fr 1fr;gap:12px}
    .detail{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}
    pre{margin:0;white-space:pre-wrap;word-break:break-word;font:12px/1.45 Consolas,"Courier New",monospace}
    .good{color:var(--good)} .bad{color:var(--bad)}
    a{color:var(--gold);text-decoration:none}
    @media(max-width:980px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel" style="margin-bottom:12px">
      <div class="row">
        <h2 style="margin:0">区间排行榜</h2>
        <a href="/">首页</a>
        <a href="/admin">后台</a>
      </div>
      <div class="row" style="margin-top:8px">
        <label>年份区间</label>
        <select id="startYear"></select>
        <span>至</span>
        <select id="endYear"></select>
        <button id="applyBtn">应用</button>
        <button id="refreshBtn">刷新</button>
      </div>
      <div id="meta" class="meta" style="margin-top:8px">加载中...</div>
    </div>
    <div class="grid">
      <div class="panel">
        <table>
          <thead><tr>
            <th>#</th><th>区间</th><th>评分</th><th>收益率</th><th>投入</th><th>最终市值</th><th>黄金</th><th>沪深300</th><th>标普500</th>
          </tr></thead>
          <tbody id="rows"><tr><td colspan="9">加载中...</td></tr></tbody>
        </table>
      </div>
      <div class="detail">
        <div style="font-weight:700;margin-bottom:6px">选中策略参数</div>
        <pre id="detail">点击任意一行查看详情。</pre>
      </div>
    </div>
  </div>
  <script>
    const state = { selectedRange: "", selectedIndex: 0, entries: [], ranges: [], minYear: null, maxYear: null };
    const cloudMode = location.hostname === "dcalab.juryory.com";
    const pct = (v) => `${(Number(v) * 100).toFixed(2)}%`;
    const money = (v) => Number(v).toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    async function api(path) {
      const r = await fetch(path);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    }

    function formatEntry(entry) {
      if (!entry) return "暂无详情。";
      const lines = [];
      const weights = entry.weights || {};
      const configs = entry.configs || {};
      lines.push("权重");
      lines.push(`黄金AU9999: ${((weights.au9999 || 0) * 100).toFixed(0)}%`);
      lines.push(`沪深300: ${((weights.csi300 || 0) * 100).toFixed(0)}%`);
      lines.push(`标普500: ${((weights.sp500 || 0) * 100).toFixed(0)}%`);
      lines.push("");
      for (const key of ["au9999", "csi300", "sp500"]) {
        const cfg = configs[key];
        if (!cfg) continue;
        lines.push(key.toUpperCase());
        lines.push(`baseAmount: ${cfg.baseAmount}`);
        lines.push(`dipAmount: ${cfg.dipAmount}`);
        lines.push(`maWindow: ${cfg.maWindow}`);
        lines.push(`scheduleMode: ${cfg.scheduleMode}`);
        lines.push(`scheduleDays: ${cfg.scheduleDays ?? "-"}`);
        lines.push(`scheduleWeekday: ${cfg.scheduleWeekday ?? "-"}`);
        lines.push(`buyMode: ${cfg.buyMode}`);
        lines.push(`dynamicEnabled: ${cfg.dynamicEnabled ? "true" : "false"}`);
        lines.push("");
      }
      return lines.join("\n");
    }

    function setYearOptions() {
      if (!Number.isInteger(state.minYear) || !Number.isInteger(state.maxYear)) return;
      const years = [];
      for (let y = state.minYear; y <= state.maxYear; y++) years.push(y);
      startYear.innerHTML = years.map((y) => `<option value="${y}">${y}</option>`).join("");
      endYear.innerHTML = years.map((y) => `<option value="${y}">${y}</option>`).join("");
      const seg = String(state.selectedRange || `${state.minYear}-${state.maxYear}`).split("-");
      startYear.value = String(Number(seg[0]) || state.minYear);
      endYear.value = String(Number(seg[1]) || state.maxYear);
    }

    function render() {
      setYearOptions();
      if (!state.entries.length) {
        rows.innerHTML = '<tr><td colspan="9">当前区间暂无结果。</td></tr>';
        detail.textContent = "当前区间暂无结果。";
        return;
      }
      if (state.selectedIndex >= state.entries.length) state.selectedIndex = 0;
      rows.innerHTML = state.entries.map((entry, i) => {
        const w = entry.weights || {};
        return `<tr data-i="${i}" class="${i === state.selectedIndex ? "selected" : ""}">
          <td>${i + 1}</td>
          <td>${entry.rangeKey}</td>
          <td>${Number(entry.score).toFixed(2)}</td>
          <td class="${entry.returnRate >= 0 ? "good" : "bad"}">${pct(entry.returnRate)}</td>
          <td>${money(entry.totalInvested)}</td>
          <td>${money(entry.finalValue)}</td>
          <td>${((w.au9999 || 0) * 100).toFixed(0)}%</td>
          <td>${((w.csi300 || 0) * 100).toFixed(0)}%</td>
          <td>${((w.sp500 || 0) * 100).toFixed(0)}%</td>
        </tr>`;
      }).join("");
      detail.textContent = formatEntry(state.entries[state.selectedIndex]);
    }

    function deriveBounds(ranges) {
      let minYear = null;
      let maxYear = null;
      for (const item of ranges || []) {
        const seg = String(item.key || "").split("-");
        const a = Number(seg[0]);
        const b = Number(seg[1]);
        if (!Number.isInteger(a) || !Number.isInteger(b)) continue;
        minYear = minYear === null ? Math.min(a, b) : Math.min(minYear, a, b);
        maxYear = maxYear === null ? Math.max(a, b) : Math.max(maxYear, a, b);
      }
      return { minYear, maxYear };
    }

    async function loadCloud() {
      const summary = await api("/api/range?range=all");
      state.ranges = Array.isArray(summary.ranges) ? summary.ranges : [];
      const bounds = deriveBounds(state.ranges);
      state.minYear = bounds.minYear;
      state.maxYear = bounds.maxYear;
      if (!state.selectedRange && state.minYear !== null && state.maxYear !== null) {
        state.selectedRange = `${state.minYear}-${state.maxYear}`;
      }
      if (!state.selectedRange) {
        state.entries = [];
        meta.textContent = "云端 API 暂无区间数据。";
        render();
        return;
      }
      const detailData = await api(`/api/range?range=${encodeURIComponent(state.selectedRange)}`);
      state.entries = Array.isArray(detailData.entries) ? detailData.entries : [];
      meta.textContent = `云端 API | 区间数量: ${state.ranges.length} | 当前区间: ${state.selectedRange}`;
      render();
    }

    async function loadLocal() {
      const data = await api(`/api/leaderboard?range=${encodeURIComponent(state.selectedRange)}&limit=10`);
      state.entries = Array.isArray(data.entries) ? data.entries : [];
      state.ranges = Array.isArray(data.ranges) ? data.ranges : [];
      state.minYear = Number.isInteger(data.meta.minYear) ? data.meta.minYear : null;
      state.maxYear = Number.isInteger(data.meta.maxYear) ? data.meta.maxYear : null;
      if (!state.selectedRange && state.minYear !== null && state.maxYear !== null) {
        state.selectedRange = `${state.minYear}-${state.maxYear}`;
        return loadLocal();
      }
      meta.textContent = `本地 API | 数据年份: ${data.meta.minYear || "-"}-${data.meta.maxYear || "-"} | 更新时间: ${data.meta.updatedAt || "-"} | 当前区间: ${state.selectedRange}`;
      render();
    }

    async function load() {
      try {
        if (cloudMode) return await loadCloud();
        return await loadLocal();
      } catch (err) {
        meta.textContent = `加载失败: ${err.message}`;
      }
    }

    applyBtn.onclick = () => {
      const s = Number(startYear.value);
      const e = Number(endYear.value);
      if (!Number.isInteger(s) || !Number.isInteger(e)) return;
      state.selectedRange = s <= e ? `${s}-${e}` : `${e}-${s}`;
      state.selectedIndex = 0;
      load();
    };

    refreshBtn.onclick = () => load();
    rows.onclick = (e) => {
      const tr = e.target.closest("tr[data-i]");
      if (!tr) return;
      state.selectedIndex = Number(tr.dataset.i);
      render();
    };

    load();
    setInterval(load, cloudMode ? 15000 : 5000);
  </script>
</body>
</html>
