<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AUSUB &#x540E;&#x53F0;&#x7BA1;&#x7406;</title>
  <style>
    :root{--bg:#f6f1e7;--panel:#fffdf8;--line:#dfd3c0;--text:#30271b;--muted:#6f6554;--gold:#9a6818}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 "Segoe UI",sans-serif}
    .wrap{max-width:1000px;margin:0 auto;padding:20px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    input,button{padding:8px 10px;border:1px solid var(--line);border-radius:10px;background:#fff}
    button{cursor:pointer}
    .primary{background:var(--gold);color:#fff;border-color:var(--gold)}
    .meta{font-size:12px;color:var(--muted)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px 6px;border-bottom:1px solid #eee4d3;text-align:left}
    th{color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="row">
        <h2 style="margin:0">AUSUB &#x540E;&#x53F0;&#x7BA1;&#x7406;</h2>
        <a href="/">&#x524D;&#x5F80;&#x6392;&#x884C;&#x699C;</a>
      </div>
      <div id="statusText" class="meta" style="margin-top:8px">&#x52A0;&#x8F7D;&#x4E2D;...</div>
    </div>

    <div class="panel">
      <h3 style="margin-top:0">&#x4E0A;&#x4F20;&#x884C;&#x60C5; CSV</h3>
      <div class="row">
        <input id="csvFile" type="file" accept=".csv">
        <button id="uploadBtn">&#x4E0A;&#x4F20;&#x5E76;&#x66FF;&#x6362;&#x6570;&#x636E;</button>
      </div>
      <div class="meta" style="margin-top:6px">&#x589E;&#x91CF;&#x66F4;&#x65B0;&#x6A21;&#x5F0F;&#xFF1A;&#x4EC5;&#x5199;&#x5165;&#x65B0;&#x65E5;&#x671F;&#x6570;&#x636E;&#xFF0C;&#x5DF2;&#x5B58;&#x5728;&#x65E5;&#x671F;&#x4E0D;&#x8986;&#x76D6;&#x3002;</div>
    </div>

    <div class="panel">
      <h3 style="margin-top:0">&#x5F15;&#x64CE;&#x63A7;&#x5236;</h3>
      <div class="row">
        <label>&#x6BCF;&#x8F6E;&#x62BD;&#x6837;: <input id="batch" type="number" value="100" style="width:110px"></label>
        <label>&#x60E9;&#x7F5A;&#x6743;&#x91CD;: <input id="penalty" type="number" value="0.08" step="0.01" style="width:110px"></label>
        <button class="primary" id="startBtn">&#x542F;&#x52A8;</button>
        <button id="stopBtn">&#x505C;&#x6B62;</button>
      </div>
    </div>

    <div class="panel">
      <h3 style="margin-top:0">&#x7A33;&#x5065;&#x641C;&#x7D22;&#xFF08;&#x5E73;&#x5747;&#x6700;&#x4F18;&#x89E3;&#xFF09;</h3>
      <div class="row">
        <label>&#x6BCF;&#x7EC4;&#x7A97;&#x53E3;&#x6570;: <input id="robustWindowCount" type="number" value="10" min="2" style="width:80px"></label>
        <label>&#x6BCF;&#x8F6E;&#x62BD;&#x6837;: <input id="robustBatch" type="number" value="50" style="width:80px"></label>
        <label>&#x60E9;&#x7F5A;&#x6743;&#x91CD;: <input id="robustPenalty" type="number" value="0.08" step="0.01" style="width:80px"></label>
        <button class="primary" id="robustStartBtn">&#x542F;&#x52A8;</button>
        <button id="robustStopBtn">&#x505C;&#x6B62;</button>
      </div>
      <div id="robustStatusText" class="meta" style="margin-top:6px">&#x52A0;&#x8F7D;&#x4E2D;...</div>
    </div>

    <div class="panel">
      <h3 style="margin-top:0">&#x533A;&#x95F4;&#x8986;&#x76D6;</h3>
      <table>
        <thead><tr><th>&#x5E74;&#x4EFD;&#x533A;&#x95F4;</th><th>&#x8BB0;&#x5F55;&#x6570;</th><th>&#x6700;&#x4F73;&#x8BC4;&#x5206;</th></tr></thead>
        <tbody id="rangeRows"><tr><td colspan="3">&#x52A0;&#x8F7D;&#x4E2D;...</td></tr></tbody>
      </table>
    </div>
  </div>

  <script>
    let adminToken = localStorage.getItem("ausub_admin_token") || "";
    if (!adminToken) {
      adminToken = prompt("请输入管理员 Token：") || "";
      if (adminToken) localStorage.setItem("ausub_admin_token", adminToken);
    }

    async function api(path, method = "GET", body) {
      const r = await fetch(path, {
        method,
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${adminToken}` },
        body: body ? JSON.stringify(body) : undefined
      });
      if (r.status === 401) {
        localStorage.removeItem("ausub_admin_token");
        adminToken = prompt("Token 无效，请重新输入：") || "";
        if (adminToken) localStorage.setItem("ausub_admin_token", adminToken);
        throw new Error("认证失败，请刷新重试");
      }
      if (!r.ok) {
        let msg = `HTTP ${r.status}`;
        try { const j = await r.json(); msg = j.error || msg; } catch {}
        throw new Error(msg);
      }
      return r.json();
    }

    async function refresh() {
      try {
        const [status, board, robustStatus] = await Promise.all([
          api("/api/admin/status"),
          api("/api/leaderboard?range=all&limit=1"),
          api("/api/admin/robust/status")
        ]);
        statusText.textContent = `\u8fd0\u884c\u72b6\u6001: ${status.running ? "\u8fd0\u884c\u4e2d" : "\u5df2\u505c\u6b62"} | \u5c1d\u8bd5: ${status.attempts} | \u6709\u6548: ${status.valid} | \u6570\u636e\u5e74\u4efd: ${status.minYear || "-"}-${status.maxYear || "-"} | \u533a\u95f4\u6570: ${status.totalRanges} | \u5b58\u50a8\u6587\u4ef6: ${status.storePath}`;
        const tc = robustStatus.topCounts || {};
        const tcStr = Object.entries(tc).map(([y,c]) => `${y}y:${c}`).join(" ");
        robustStatusText.textContent = `\u8fd0\u884c\u72b6\u6001: ${robustStatus.running ? "\u8fd0\u884c\u4e2d" : "\u5df2\u505c\u6b62"} | \u5c1d\u8bd5: ${robustStatus.attempts} | \u6709\u6548: ${robustStatus.valid} | \u7a97\u53e3\u6570: ${robustStatus.windowCount} | \u5404\u5468\u671f: ${tcStr || "-"}`;
        const ranges = Array.isArray(board.ranges) ? board.ranges : [];
        rangeRows.innerHTML = ranges.length
          ? ranges.map((r) => `<tr><td>${r.key}</td><td>${r.count}</td><td>${r.bestScore === null ? "-" : r.bestScore.toFixed(2)}</td></tr>`).join("")
          : `<tr><td colspan="3">\u6682\u65e0\u533a\u95f4\u7ed3\u679c\u3002</td></tr>`;
      } catch (err) {
        statusText.textContent = `\u5237\u65b0\u5931\u8d25: ${err.message}`;
      }
    }

    uploadBtn.onclick = async () => {
      const f = csvFile.files && csvFile.files[0];
      if (!f) {
        statusText.textContent = "\u8bf7\u5148\u9009\u62e9 CSV \u6587\u4ef6\u3002";
        return;
      }
      const text = await f.text();
      try {
        const out = await api("/api/admin/upload-csv", "POST", { filename: f.name, content: text });
        const u = out.upload || {};
        statusText.textContent = `\u4e0a\u4f20\u6210\u529f: ${f.name} | \u65b0\u589e ${u.addedRows || 0} \u6761, \u5ffd\u7565 ${u.ignoredRows || 0} \u6761`;
        refresh();
      } catch (err) {
        statusText.textContent = `\u4e0a\u4f20\u5931\u8d25: ${err.message}`;
      }
    };

    startBtn.onclick = async () => {
      try {
        await api("/api/admin/start", "POST", {
          batch: Number(batch.value) || 100,
          penalty: Number(penalty.value) || 0.08
        });
        statusText.textContent = "\u5f15\u64ce\u5df2\u542f\u52a8\u3002";
        refresh();
      } catch (err) {
        statusText.textContent = `\u542f\u52a8\u5931\u8d25: ${err.message}`;
      }
    };

    stopBtn.onclick = async () => {
      try {
        await api("/api/admin/stop", "POST", {});
        statusText.textContent = "\u5f15\u64ce\u5df2\u505c\u6b62\u3002";
        refresh();
      } catch (err) {
        statusText.textContent = `\u505c\u6b62\u5931\u8d25: ${err.message}`;
      }
    };

    robustStartBtn.onclick = async () => {
      try {
        await api("/api/admin/robust/start", "POST", {
          windowCount: Number(robustWindowCount.value) || 10,
          batch: Number(robustBatch.value) || 50,
          penalty: Number(robustPenalty.value) || 0.08,
        });
        robustStatusText.textContent = "\u7a33\u5065\u641c\u7d22\u5df2\u542f\u52a8\u3002";
        refresh();
      } catch (err) {
        robustStatusText.textContent = `\u542f\u52a8\u5931\u8d25: ${err.message}`;
      }
    };

    robustStopBtn.onclick = async () => {
      try {
        await api("/api/admin/robust/stop", "POST", {});
        robustStatusText.textContent = "\u7a33\u5065\u641c\u7d22\u5df2\u505c\u6b62\u3002";
        refresh();
      } catch (err) {
        robustStatusText.textContent = `\u505c\u6b62\u5931\u8d25: ${err.message}`;
      }
    };

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
